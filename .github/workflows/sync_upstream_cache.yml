name: Sync Upstream Cache

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sync dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas pyarrow requests biopython

      - name: Sync upstream data and rebuild cache artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/sync_upstream_data.py \
            --base-dir . \
            --source upstream \
            --repo Reclone-org/Open-DNA-Collections \
            --branch main

      - name: Commit updated cache artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cache/*.parquet data/cache/*.json data/cache/*.fasta
          if git diff --cached --quiet; then
            echo "No cache changes to commit"
          else
            git commit -m "chore(cache): sync upstream Open-DNA-Collections main"
            git push
          fi
